<style>
    /* --- Vibrant & Animated UI Theme --- */
    :root {
      /* Light Theme: Bright moving gradient */
      --color-1: #ff9a9e;
      --color-2: #fecfef;
      --color-3: #a1c4fd;
      --color-4: #c2e9fb;
      --card-bg: rgba(255, 255, 255, 0.85);
      --text-color: #2b2b2b;
      --btn-bg: #ff758c;
      --btn-hover: #ff7eb3;
      --input-bg: #ffffff;
      --border-color: rgba(0, 0, 0, 0.1);
    }
    
    .dark-mode {
      /* Dark Theme: Deep neon moving gradient */
      --color-1: #231557;
      --color-2: #44107A;
      --color-3: #FF1361;
      --color-4: #FF8B00;
      --card-bg: rgba(20, 20, 20, 0.85);
      --text-color: #f0f0f0;
      --btn-bg: #FF1361;
      --btn-hover: #ff4783;
      --input-bg: #2a2a2a;
      --border-color: rgba(255, 255, 255, 0.1);
    }

    /* 1. Shifting Gradient Background */
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(45deg, var(--color-1), var(--color-2), var(--color-3), var(--color-4));
      background-size: 400% 400%;
      animation: gradientShift 12s ease infinite;
      color: var(--text-color);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      transition: color 0.4s ease;
    }

    /* 2. Floating Dashboard Card */
    .dashboard {
      background: var(--card-bg);
      padding: 2.5rem;
      border-radius: 20px;
      border: 1px solid var(--border-color);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 400px;
      text-align: center;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      /* Entrance animation */
      animation: popIn 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55) forwards;
      /* Continuous floating animation */
      transform: translateY(0);
      transition: background 0.4s ease;
    }

    .dashboard:hover {
      animation: float 4s ease-in-out infinite;
    }

    h2 {
      margin-top: 0;
      font-size: 2rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      background: linear-gradient(to right, var(--btn-bg), var(--btn-hover));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1.5rem;
    }

    /* 3. Smooth Inputs */
    .controls input, .controls select, .controls button {
      padding: 12px 15px;
      margin: 8px 0;
      border-radius: 50px; /* Pill shapes */
      border: 2px solid var(--border-color);
      background: var(--input-bg);
      color: var(--text-color);
      width: 100%;
      box-sizing: border-box;
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    .controls input:focus, .controls select:focus {
      border-color: var(--btn-bg);
      transform: scale(1.02);
      box-shadow: 0 0 15px rgba(255, 117, 140, 0.2);
    }

    /* 4. Glowing Buttons */
    .controls button {
      background: var(--btn-bg);
      color: #fff;
      border: none;
      cursor: pointer;
      font-weight: bold;
      letter-spacing: 0.5px;
    }

    .controls button:hover {
      background: var(--btn-hover);
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 10px 20px rgba(0,0,0,0.15), 0 0 15px var(--btn-bg);
    }

    .controls button:active {
      transform: translateY(1px) scale(0.98);
      box-shadow: 0 5px 10px rgba(0,0,0,0.1);
    }

    .flex-row {
      display: flex;
      gap: 10px;
    }

    /* 5. Dynamic Weather Display */
    .weather-display {
      margin-top: 25px;
      padding-top: 20px;
      border-top: 2px dashed var(--border-color);
      animation: slideUpFade 0.6s ease-out;
    }

    /* Pulsing Temperature */
    .temperature {
      font-size: 4.5rem;
      font-weight: 900;
      margin: 10px 0;
      animation: pulseTemp 2s infinite;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
    }

    .error {
      color: #ff3366;
      font-weight: bold;
      animation: shake 0.4s ease-in-out;
    }

    /* --- Keyframe Animations --- */

    /* Moves the background gradient */
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Springy entrance for the main card */
    @keyframes popIn {
      0% { opacity: 0; transform: scale(0.8) translateY(30px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* Gentle hover float for the card */
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    /* Weather data loads in smoothly */
    @keyframes slideUpFade {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Soft heartbeat pulse on the temperature text */
    @keyframes pulseTemp {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); color: var(--btn-bg); }
    }

    /* Error message shake */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      50% { transform: translateX(5px); }
      75% { transform: translateX(-5px); }
    }
  </style>
